version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: vacation_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vacation_db
      POSTGRES_USER: vacation_user
      POSTGRES_PASSWORD: vacation_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
